services:
  backend:
    build:
      context: ./backend
      dockerfile: src/Dashboard.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Data Source=/data/dashboard.db"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    volumes:
      - sqlite-data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sqlite-data:
